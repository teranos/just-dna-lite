quality_filters:
  pass_filters:
  - PASS
  - .
  min_depth: 10
  min_qual: 20

immutable_mode:
  enabled: false
  allow_zenodo_import: false
  disclaimer: "This is a public demo with pre-loaded public genomes. To analyze your own genome, install just-dna-lite locally: https://github.com/dna-seq/just-dna-lite"
  default_samples:
  - zenodo_url: "https://zenodo.org/records/18370498"
    label: "Anton Kulaga"
    subject_id: "antonkulaga"
    sex: "Male"
    species: "Homo sapiens"
    reference_genome: "GRCh38"
    license: "CC-Zero"
  - zenodo_url: "https://zenodo.org/records/19487816"
    label: "Livia Zaharia"
    subject_id: "SIMHIFQTILQ"
    sex: "Female"
    species: "Homo sapiens"
    reference_genome: "GRCh38"
    license: "CC-BY-4.0"
ensembl_source:
  repo_id: just-dna-seq/ensembl_variations
sources:
- url: just-dna-seq/annotators
  kind: collection
- url: /data/sources/just-dna-lite/data/output/modules
  kind: collection
- url: /data/sources/just-dna-lite/data/interim/registered_modules
  kind: collection
module_metadata:
  longevitymap:
    title: Longevity Map
    description: Longevity-associated genetic variants from LongevityMap database
    report_title: Longevity Variants
    icon: heart-pulse
    color: '#21ba45'
  lipidmetabolism:
    title: Lipid Metabolism
    description: Lipid metabolism and cardiovascular risk variants
    report_title: Lipid Metabolism
    icon: droplets
    color: '#fbbd08'
  vo2max:
    title: VO2 Max
    description: Athletic performance and oxygen uptake capacity variants
    report_title: VO2max / Athletic Performance
    icon: activity
    color: '#2185d0'
  superhuman:
    title: Superhuman
    description: Elite performance and rare beneficial variants
    report_title: Superhuman / Elite Performance
    icon: zap
    color: '#00b5ad'
  coronary:
    title: Coronary
    description: Coronary artery disease risk associations
    report_title: Coronary Artery Disease
    icon: heart
    color: '#db2828'
  drugs:
    title: Pharmacogenomics
    description: Drug response and metabolism (PharmGKB)
    report_title: Pharmacogenomics
    icon: pill
    color: '#a333c8'
